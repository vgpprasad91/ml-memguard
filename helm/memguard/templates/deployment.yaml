apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "memguard.fullname" . }}
  labels:
    {{- include "memguard.labels" . | nindent 4 }}
  {{- with .Values.podAnnotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "memguard.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "memguard.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "memguard.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      # -----------------------------------------------------------------------
      # Volumes
      # -----------------------------------------------------------------------
      volumes:
        - name: hf-cache
          {{- if .Values.vllm.modelCachePVC }}
          persistentVolumeClaim:
            claimName: {{ .Values.vllm.modelCachePVC }}
          {{- else }}
          emptyDir: {}
          {{- end }}

      # -----------------------------------------------------------------------
      # Containers — vLLM + memguard sidecar share the pod network namespace.
      # The sidecar reaches vLLM at http://localhost:8000 (no service hop).
      # -----------------------------------------------------------------------
      containers:

        # ---------------------------------------------------------------------
        # 1. vLLM inference server
        # ---------------------------------------------------------------------
        - name: vllm
          image: "{{ .Values.vllm.image.repository }}:{{ .Values.vllm.image.tag }}"
          imagePullPolicy: {{ .Values.vllm.image.pullPolicy }}
          args:
            - --model
            - {{ required "vllm.modelName is required" .Values.vllm.modelName | quote }}
            {{- range .Values.vllm.extraArgs }}
            - {{ . | quote }}
            {{- end }}
          ports:
            - name: inference
              containerPort: {{ .Values.vllm.port }}
              protocol: TCP
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              {{- if .Values.vllm.hfToken }}
              valueFrom:
                secretKeyRef:
                  name: {{ include "memguard.fullname" . }}-hf-secret
                  key: HF_TOKEN
              {{- else }}
              value: ""
              {{- end }}
          volumeMounts:
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          livenessProbe:
            {{- toYaml .Values.vllm.livenessProbe | nindent 12 }}
          readinessProbe:
            # Kubernetes probes the memguard sidecar /readyz (port 8001).
            # 503 → pod removed from Service endpoints → no new inference traffic.
            {{- toYaml .Values.vllm.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.vllm.resources | nindent 12 }}

        # ---------------------------------------------------------------------
        # 2. memguard sidecar
        # Installs ml-memguard on first boot, then runs memory_guard.sidecar.
        # Uses localhost:8000 — same pod network as vLLM.
        # ---------------------------------------------------------------------
        - name: memguard-sidecar
          image: "{{ .Values.sidecar.image.repository }}:{{ .Values.sidecar.image.tag }}"
          imagePullPolicy: {{ .Values.sidecar.image.pullPolicy }}
          command:
            - sh
            - -c
            - |
              set -e
              pip install ml-memguard --quiet --no-cache-dir
              exec python -m memory_guard.sidecar \
                --vllm-url      http://localhost:{{ .Values.vllm.port }} \
                --host          0.0.0.0 \
                --port          {{ .Values.sidecar.port }} \
                --threshold     $(MEMGUARD_SHED_THRESHOLD) \
                --poll-interval $(MEMGUARD_POLL_INTERVAL) \
                --smoothing-window $(MEMGUARD_SMOOTHING_WIN) \
                --model-name    "$(MEMGUARD_MODEL_NAME)" \
                --backend       "$(MEMGUARD_BACKEND)" \
                --policy-name   "$(MEMGUARD_POLICY_NAME)"
          ports:
            - name: sidecar
              containerPort: {{ .Values.sidecar.port }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "memguard.fullname" . }}-config
          env:
            {{- if or .Values.memguardCloud.apiKey .Values.memguardCloud.existingSecret }}
            - name: MEMGUARD_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "memguard.cloudSecretName" . }}
                  key: {{ .Values.memguardCloud.existingSecretKey }}
            {{- end }}
          livenessProbe:
            {{- toYaml .Values.sidecar.livenessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.sidecar.resources | nindent 12 }}

      # -----------------------------------------------------------------------
      # Scheduling
      # -----------------------------------------------------------------------
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
