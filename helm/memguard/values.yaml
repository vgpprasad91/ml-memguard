# --------------------------------------------------------------------------- #
# memguard Helm chart — values.yaml                                           #
# --------------------------------------------------------------------------- #

# ---------------------------------------------------------------------------
# vLLM container
# ---------------------------------------------------------------------------
vllm:
  image:
    repository: vllm/vllm-openai
    tag: latest
    pullPolicy: IfNotPresent

  # HuggingFace model ID — required
  modelName: ""

  # HuggingFace access token (needed for gated models).
  # Set via --set vllm.hfToken=hf_... or mount a Secret instead.
  hfToken: ""

  # vLLM launch flags appended after --model
  extraArgs:
    - --host
    - "0.0.0.0"
    - --port
    - "8000"
    - --enable-prefix-caching
    - --max-model-len
    - "4096"

  port: 8000

  resources:
    requests:
      memory: "16Gi"
      cpu: "4"
    limits:
      memory: "64Gi"
      cpu: "16"
      nvidia.com/gpu: "1"

  # HuggingFace model cache volume (PVC name or empty to use emptyDir)
  modelCachePVC: ""

  livenessProbe:
    httpGet:
      path: /health
      port: 8000
    initialDelaySeconds: 60
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    # Delegates to the memguard sidecar /readyz — do NOT set this to /health.
    # Kubernetes removes the pod from the Service endpoint set when /readyz
    # returns 503, which is the core load-shedding mechanism.
    httpGet:
      path: /readyz
      port: 8001
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 1

# ---------------------------------------------------------------------------
# memguard sidecar
# ---------------------------------------------------------------------------
sidecar:
  image:
    repository: python
    tag: "3.11-slim"
    pullPolicy: IfNotPresent

  # OOM probability threshold above which /readyz returns 503 (0–1).
  # 0.70 is a conservative default; lower for more aggressive shedding.
  shedThreshold: 0.70

  # Seconds between KV cache polls from vLLM /metrics
  pollInterval: 5.0

  # Rolling-max smoothing window for KV utilization.
  # Use 1 for vLLM (paged attention, no smoothing needed).
  # Use 3 for SGLang (RadixAttention eviction drops require smoothing).
  smoothingWindow: 1

  # Model name forwarded to monitoring signals and memguard-cloud telemetry.
  # Defaults to vllm.modelName when left empty.
  modelName: ""

  # Hardware backend string attached to telemetry (e.g. "cuda", "metal").
  # Auto-detected when empty.
  backend: ""

  port: 8001

  resources:
    requests:
      memory: "256Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

  livenessProbe:
    httpGet:
      path: /healthz
      port: 8001
    initialDelaySeconds: 10
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

# ---------------------------------------------------------------------------
# Deployment
# ---------------------------------------------------------------------------
replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# Node selector, tolerations, and affinity for GPU node scheduling
nodeSelector:
  # Uncomment to pin to GPU nodes:
  # accelerator: nvidia-tesla-h100
  {}

tolerations: []
#  - key: nvidia.com/gpu
#    operator: Exists
#    effect: NoSchedule

affinity: {}

podAnnotations: {}
podSecurityContext: {}

# Image pull secrets (for private registries or gated HF model images)
imagePullSecrets: []

# ---------------------------------------------------------------------------
# Service
# ---------------------------------------------------------------------------
service:
  type: ClusterIP
  # vLLM inference port
  vllmPort: 8000
  # memguard sidecar port (probed by Kubernetes readinessProbe)
  sidecarPort: 8001

# ---------------------------------------------------------------------------
# ServiceAccount
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  annotations: {}
  name: ""

# ---------------------------------------------------------------------------
# PodDisruptionBudget
# Ensures rolling restarts never take all replicas down simultaneously.
# minAvailable: 1 means at least one pod stays in service during node drains.
# ---------------------------------------------------------------------------
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ---------------------------------------------------------------------------
# Autoscaling — KEDA ScaledObject (requires KEDA installed in the cluster)
#
# When enabled, creates a ScaledObject that scales the vLLM Deployment on
# the vllm_kv_cache_usage_perc Prometheus metric exposed by the sidecar.
# Scale-up at threshold% utilization; scale-down during cooldownPeriod.
#
# Check KEDA is installed: kubectl get crd scaledobjects.keda.sh
# ---------------------------------------------------------------------------
autoscaling:
  keda:
    enabled: false
    minReplicaCount: 1
    maxReplicaCount: 10
    # Seconds between metric polls
    pollingInterval: 30
    # Seconds to wait after last scale event before scaling down
    cooldownPeriod: 300
    # Prometheus server reachable from within the cluster
    prometheusAddress: "http://prometheus-server.monitoring.svc.cluster.local"
    # PromQL query — returns a scalar utilization value (0–100)
    prometheusQuery: "avg(vllm_kv_cache_usage_perc)"
    # Scale up when average KV cache utilization exceeds this percentage
    scaleUpThreshold: "65"

# ---------------------------------------------------------------------------
# Patch existing vLLM Deployment (bring-your-own-vLLM scenario)
#
# When enabled, a post-install Helm hook Job runs `kubectl patch` to inject
# the memguard /readyz readinessProbe into an existing vLLM Deployment that
# was NOT deployed via this chart.
#
# Requires the chart's ServiceAccount to have patch rights on the target
# Deployment — a ClusterRole is created automatically when this is enabled.
#
# Usage:
#   helm install memguard-probe memguard/memguard \
#     --set patchExistingDeployment.enabled=true \
#     --set patchExistingDeployment.targetDeployment=my-vllm \
#     --set patchExistingDeployment.targetNamespace=inference \
#     --set vllm.modelName=placeholder   # required field, value unused here
# ---------------------------------------------------------------------------
patchExistingDeployment:
  enabled: false
  # Name of the existing vLLM Deployment to patch
  targetDeployment: ""
  # Namespace of the target Deployment (defaults to .Release.Namespace)
  targetNamespace: ""
  # Name of the vLLM container inside the Deployment
  containerName: "vllm"

# ---------------------------------------------------------------------------
# MemGuardPolicy CRD — optional in-cluster hot-reload
#
# When name is non-empty and the sidecar is running inside a Kubernetes pod,
# the sidecar fetches the named MemGuardPolicy on startup and watches it for
# changes.  Threshold updates take effect within one probe cycle — no pod
# restart required.
#
# Create the CRD object first:
#   kubectl apply -f examples/k8s/memguardpolicy.yaml -n inference
#
# Then reference it here:
#   helm upgrade my-vllm memguard/memguard \
#     --set memguardPolicy.name=default \
#     --reuse-values
#
# Leave empty to use the values from ConfigMap (sidecar.shedThreshold etc.)
# without CRD hot-reload.
# ---------------------------------------------------------------------------
memguardPolicy:
  name: ""

# ---------------------------------------------------------------------------
# Optional: memguard-cloud API key
# Populate via: helm install ... --set memguardCloud.apiKey=mg_...
# or by referencing an existing Secret (set existingSecret).
# ---------------------------------------------------------------------------
memguardCloud:
  apiKey: ""
  existingSecret: ""
  existingSecretKey: "MEMGUARD_API_KEY"
